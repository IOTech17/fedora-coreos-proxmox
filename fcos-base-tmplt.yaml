#blacklist protocol/drivers
    - path: /etc/modprobe.d/blacklist.conf
      mode: 0644
      contents:
        inline: |
          install cramfs /bin/true
          install hfs /bin/true
          install hfsplus /bin/true
          install jffs2 /bin/true
          install squashfs /bin/true
          install udf /bin/true
          blacklist firewire-core
          blacklist usb-storage
          install tipc /bin/true
          blacklist tipc
          install rds /bin/true
          blacklist rds
          install sctp /bin/true
          blacklist sctp
          install dccp /bin/true
          blacklist dccp

#harden ssh
# Named 49-hardening.conf to load before 50-redhat.conf which sets X11Forwarding yes.
# OpenSSH uses the first occurrence of an option, so we must come first.
    - path: /etc/ssh/sshd_config.d/49-hardening.conf
      mode: 0644
      contents:
        inline: |
          AllowAgentForwarding no
          X11Forwarding no
          X11UseLocalhost yes
          TCPKeepAlive no
          MaxSessions 2
          MaxAuthTries 3
          LogLevel VERBOSE
          Compression no
          ClientAliveCountMax 2
          AllowTcpForwarding no
          PermitUserEnvironment no
          StrictModes yes
          port 59500
          Banner /etc/issue.net

#Disabling core dumps
    - path: /etc/security/limits.d/disablecoredumps.conf
      mode: 0644
      contents:
        inline: |
          * hard core 0
          * soft core 0

# login.defs hardening (AUTH-9230, AUTH-9286, AUTH-9328)
# We patch only specific values to avoid overwriting FCOS defaults:
# - YESCRYPT is already stronger than SHA512, keep it
# - SUB_UID/GID ranges are required for rootless podman, keep them
    - path: /usr/local/bin/harden-login-defs
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          # Patch /etc/login.defs without overwriting FCOS-specific values
          sed -i 's/^PASS_MAX_DAYS.*/PASS_MAX_DAYS   365/' /etc/login.defs
          sed -i 's/^PASS_MIN_DAYS.*/PASS_MIN_DAYS   1/'   /etc/login.defs
          sed -i 's/^PASS_MIN_LEN.*/PASS_MIN_LEN    12/'   /etc/login.defs
          sed -i 's/^UMASK.*/UMASK           027/'         /etc/login.defs

# kernel config
    - path: /etc/sysctl.d/20-silence-audit.conf
      mode: 0644
      contents:
        inline: |
          # Raise console message logging level from DEBUG (7) to WARNING (4)
          # to hide audit messages from the interactive console
          kernel.printk = 4

    - path: /etc/sysctl.d/90-sysctl.conf
      mode: 0644
      contents:
        inline: |
          fs.protected_fifos = 2
          dev.tty.ldisc_autoload = 0
          fs.protected_hardlinks = 1
          fs.protected_symlinks = 1
          fs.protected_regular = 2
          fs.suid_dumpable = 0
          kernel.core_uses_pid = 1
          kernel.dmesg_restrict = 1
          kernel.kptr_restrict = 2
          kernel.panic = 60
          kernel.panic_on_oops = 60
          kernel.perf_event_paranoid = 3
          kernel.randomize_va_space = 2
          kernel.sysrq = 0
          kernel.unprivileged_bpf_disabled = 1
          kernel.yama.ptrace_scope = 2
          net.core.bpf_jit_harden = 2
          net.ipv4.conf.all.forwarding = 0
          net.ipv4.conf.all.accept_redirects = 0
          net.ipv4.conf.all.accept_source_route = 0
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.conf.all.rp_filter = 1
          net.ipv4.conf.all.secure_redirects = 0
          net.ipv4.conf.all.send_redirects = 0
          net.ipv4.conf.all.shared_media = 0
          net.ipv4.conf.default.accept_redirects = 0
          net.ipv4.conf.default.accept_source_route = 0
          net.ipv4.conf.default.log_martians = 1
          net.ipv4.conf.default.rp_filter= 1
          net.ipv4.conf.default.secure_redirects = 0
          net.ipv4.conf.default.send_redirects = 0
          net.ipv4.conf.default.shared_media = 0
          net.ipv4.icmp_echo_ignore_broadcasts = 1
          net.ipv4.icmp_ignore_bogus_error_responses = 1
          net.ipv4.ip_forward = 0
          net.ipv4.tcp_challenge_ack_limit = 1000000
          net.ipv4.tcp_invalid_ratelimit = 500
          net.ipv4.tcp_max_syn_backlog = 20480
          net.ipv4.tcp_rfc1337 = 1
          net.ipv4.tcp_syn_retries = 5
          net.ipv4.tcp_synack_retries = 2
          net.ipv4.tcp_syncookies = 1
          net.ipv4.tcp_timestamps = 0
          net.ipv6.conf.all.accept_ra = 0
          net.ipv6.conf.all.accept_redirects = 0
          net.ipv6.conf.all.accept_source_route = 0
          net.ipv6.conf.all.forwarding = 0
          net.ipv6.conf.all.use_tempaddr = 2
          net.ipv6.conf.default.accept_ra = 0
          net.ipv6.conf.default.accept_ra_defrtr = 0
          net.ipv6.conf.default.accept_ra_pinfo = 0
          net.ipv6.conf.default.accept_ra_rtr_pref = 0
          net.ipv6.conf.default.accept_redirects = 0
          net.ipv6.conf.default.accept_source_route = 0
          net.ipv6.conf.default.autoconf = 0
          net.ipv6.conf.default.dad_transmits = 0
          net.ipv6.conf.default.max_addresses = 1
          net.ipv6.conf.default.router_solicitations = 0
          net.ipv6.conf.default.use_tempaddr = 2
          net.netfilter.nf_conntrack_max = 2000000
          net.netfilter.nf_conntrack_tcp_loose = 0
          net.ipv6.conf.ens18.accept_ra_rtr_pref = 0
          vm.max_map_count = 1048575
          # Additional hardening for KRNL-6000
          kernel.modules_disabled = 0
          net.ipv4.conf.all.log_martians = 1
          net.ipv4.conf.default.log_martians = 1
          kernel.sysrq = 0
          net.ipv4.tcp_fin_timeout = 15
          net.ipv4.tcp_keepalive_time = 1800
          net.ipv4.tcp_keepalive_probes = 5
          net.ipv4.tcp_keepalive_intvl = 15
          net.ipv4.ip_local_port_range = 2000 65535
          fs.file-max = 65535

    - path: /etc/zincati/config.d/55-updates-strategy.toml
      mode: 0644
      contents:
        inline: |
          [updates]
          strategy = "periodic"

          [updates.periodic]
          time_zone = "Europe/Warsaw"

          [[updates.periodic.window]]
          days = [ "Sun" ]
          start_time = "03:30"
          length_minutes = 60

# update-hosts: script called by update-hosts.service at every boot
    - path: /usr/local/bin/update-hosts
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          # Update /etc/hosts with current IP and hostname - NAME-4404
          CURRENTIP=$(ip route get 8.8.8.8 2>/dev/null | awk 'NR==1 {print $7}')
          CURRENTHOSTNAME=$(hostname)
          [[ -z "${CURRENTIP}" ]] || [[ -z "${CURRENTHOSTNAME}" ]] && exit 0
          # Remove old entry if exists then add fresh one
          sed -i "/${CURRENTHOSTNAME}/d" /etc/hosts
          echo "${CURRENTIP} ${CURRENTHOSTNAME}.local ${CURRENTHOSTNAME}" >> /etc/hosts

# setup-user-podman-script: script called by setup-user-podman.service
# Written to disk by Ignition, executed once at first boot.
    - path: /usr/local/bin/setup-user-podman
      mode: 0755
      contents:
        inline: |
          #!/bin/bash
          set -e
          CIUSER=$(awk -F: '$5 == "CoreOS Administrator" {print $1; exit}' /etc/passwd)
          echo "Setup rootless podman socket for user: ${CIUSER}"
          loginctl enable-linger ${CIUSER}
          mkdir -p /var/home/${CIUSER}/.config/systemd/user/default.target.wants
          ln -sf /usr/lib/systemd/user/podman.socket \
            /var/home/${CIUSER}/.config/systemd/user/default.target.wants/podman.socket
          chown -R ${CIUSER}:${CIUSER} /var/home/${CIUSER}/.config
          XDG_RUNTIME_DIR=/run/user/$(id -u ${CIUSER}) \
            systemctl --user --machine=${CIUSER}@.host start podman.socket
          # enable podman-restart.service to restart containers with restart: always after reboot
          XDG_RUNTIME_DIR=/run/user/$(id -u ${CIUSER}) \
            systemctl --user --machine=${CIUSER}@.host enable --now podman-restart.service
          # enable podman-auto-update.timer to automatically update container images daily
          XDG_RUNTIME_DIR=/run/user/$(id -u ${CIUSER}) \
            systemctl --user --machine=${CIUSER}@.host enable --now podman-auto-update.timer
          touch /var/lib/setup-user-podman.stamp

systemd:
  units:
# disable and mask docker - replaced by podman
    - name: docker.service
      enabled: false
      mask: true

    - name: docker.socket
      enabled: false
      mask: true

# enable system-level podman socket (API compatible Docker, for root)
    - name: podman.socket
      enabled: true

# setup-fcos-packages: remove moby-engine/docker-cli, install qemu-guest-agent + podman-compose + podman-docker
    - name: setup-fcos-packages.service
      enabled: true
      contents: |
        [Unit]
        Description=Setup FCOS packages (qemu-guest-agent, podman-compose, podman-docker)
        After=network-online.target
        Requires=network-online.target
        ConditionKernelCommandLine=ignition.platform.id=qemu
        ConditionPathExists=!/var/lib/fcos-packages.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/rpm-ostree override remove docker-cli moby-engine
        ExecStart=/bin/rpm-ostree install qemu-guest-agent podman-compose podman-docker
        ExecStart=/bin/touch /var/lib/fcos-packages.stamp
        ExecStart=/bin/systemctl --no-block reboot

        [Install]
        WantedBy=multi-user.target

# harden-login-defs: patch login.defs at first boot
    - name: harden-login-defs.service
      enabled: true
      contents: |
        [Unit]
        Description=Harden /etc/login.defs
        ConditionPathExists=!/var/lib/harden-login-defs.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/local/bin/harden-login-defs
        ExecStart=/bin/touch /var/lib/harden-login-defs.stamp

        [Install]
        WantedBy=multi-user.target

# update-hosts: update /etc/hosts at every boot with current IP and hostname
    - name: update-hosts.service
      enabled: true
      contents: |
        [Unit]
        Description=Update /etc/hosts with current IP and hostname
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/local/bin/update-hosts

        [Install]
        WantedBy=multi-user.target

# fcos-cloudinit: apply cloudinit settings on boot
    - name: fcos-cloudinit.service
      enabled: true
      contents: |
        [Unit]
        Description=fcos Cloudinit
        Wants=network-online.target
        After=network.target network-online.target

        [Service]
        Type=oneshot
        TimeoutStartSec=0
        ExecStart=/usr/local/bin/fcos-cloudinit
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

# setup-user-podman: enable rootless podman socket for the cloudinit user
# Detects the first non-system user (uid >= 1000) created by Ignition
# and configures podman.socket to start automatically without a login session.
    - name: setup-user-podman.service
      enabled: true
      contents: |
        [Unit]
        Description=Setup rootless podman socket for cloudinit user
        After=network-online.target
        Wants=network-online.target
        ConditionPathExists=!/var/lib/setup-user-podman.stamp

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/local/bin/setup-user-podman

        [Install]
        WantedBy=multi-user.target

# fstrim
    - name: fstrim.timer
      enabled: true

    - name: fstrim.service
      dropins:
        - name: override.conf
          contents: |
            [Service]
            ExecStart=
            ExecStart=/sbin/fstrim -av